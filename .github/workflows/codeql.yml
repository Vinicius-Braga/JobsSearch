name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Toda segunda às 06:00 UTC, mesmo sem push, pra pegar vulnerabilidades novas
    # descobertas depois do último commit (não é o código que muda, é o banco de CVEs).
    - cron: '0 6 * * 1'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Compilar (CodeQL precisa do bytecode pra analisar Java)
        run: ./gradlew compileJava compileTestJava --console=plain

      - name: Rodar análise CodeQL
        uses: github/codeql-action/analyze@v3
