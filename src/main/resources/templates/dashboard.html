<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="_csrf" th:content="${_csrf.token}">
<meta name="_csrf_header" th:content="${_csrf.headerName}">
<title>JobSearch</title>
<th:block th:replace="~{fragments/styles :: global-styles}"></th:block>
<style>
    body { padding: 40px 20px; }
    .app-card { max-width: 1280px; margin: 0 auto; border-radius: 20px; overflow: hidden;
                box-shadow: var(--card-shadow); background: white; }

    header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; }
    .brand { font-weight: 800; font-size: 18px; color: var(--ink); }
    .brand .dot { color: var(--amber-500); }
    nav { display: flex; align-items: center; gap: 20px; }
    nav a { color: var(--ink-muted); text-decoration: none; font-size: 13.5px; font-weight: 600; }
    nav a:hover { color: var(--ink); }
    form.logout button { background: none; border: 1px solid var(--input-border); border-radius: 9px; padding: 8px 16px;
                          font-family: inherit; font-size: 13px; font-weight: 700; color: var(--ink-muted); cursor: pointer;
                          transition: border-color .2s, color .2s; }
    form.logout button:hover { border-color: var(--ink-muted); color: var(--ink); }

    /* --- Hero --- */
    .hero { background: linear-gradient(var(--navy-800), var(--navy-900)); padding: 48px 40px 56px; text-align: center; }
    .hero h1 { color: white; font-size: 24px; font-weight: 800; margin: 0 0 24px; }

    .profile-box { max-width: 560px; margin: 0 auto 44px; text-align: left; background: var(--glass-bg);
                   border: 1px solid var(--glass-border); border-radius: 14px; padding: 14px 18px; }
    .profile-box p { margin: 0 0 6px; color: oklch(0.92 0.01 250); font-size: 14px; line-height: 1.5; }
    .profile-box p.empty { font-style: italic; color: oklch(0.75 0.02 250); }
    .profile-box a { color: var(--amber-200); font-size: 12.5px; font-weight: 700; text-decoration: none; }
    .profile-box a:hover { text-decoration: underline; }

    /* --- Radar --- */
    .radar-wrap { position: relative; width: 200px; height: 200px; margin: 0 auto; display: flex;
                  align-items: center; justify-content: center; }
    .ring { position: absolute; border-radius: 50%; border: 3px solid transparent; }
    .ring1 { inset: 0; border-top-color: oklch(0.85 0.01 90); animation: orbitSpin 40s linear infinite; }
    .ring2 { inset: 18px; animation: orbitSpinRev 40s linear infinite; }
    .radar-wrap.active .ring1, .radar-wrap.loading .ring1 {
        border-top-color: var(--amber-500); border-right-color: oklch(0.74 0.15 70 / 0.3); animation-duration: 5s;
    }
    .radar-wrap.active .ring2, .radar-wrap.loading .ring2 {
        border-top-color: oklch(0.64 0.16 65 / 0.6); animation-duration: 7s;
    }
    .radar-wrap.loading .ring1 { animation-duration: 1.4s; }
    .radar-wrap.loading .ring2 { animation-duration: 2s; }
    @keyframes orbitSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes orbitSpinRev { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }

    .radar-btn { position: relative; z-index: 2; width: 126px; height: 126px; border-radius: 50%; border: none;
                 background: oklch(0.88 0.006 250); color: white; font-family: inherit; font-weight: 700;
                 font-size: 14.5px; cursor: not-allowed; transition: background .35s, box-shadow .35s; }
    .radar-wrap.active .radar-btn, .radar-wrap.loading .radar-btn {
        background: linear-gradient(135deg, var(--amber-500), var(--amber-600));
        box-shadow: 0 0 30px oklch(0.74 0.15 70 / 0.45);
        cursor: pointer;
    }
    .radar-wrap.loading .radar-btn { cursor: wait; }
    .radar-hint { text-align: center; color: oklch(0.65 0.02 250); font-size: 12.5px; margin-top: 16px; }

    /* --- Results --- */
    .results { background: var(--cream-100); padding: 32px 40px 56px; min-height: 100px; }
    .resumo { color: var(--ink-muted); font-size: 13px; margin: 0 0 10px; }
    .aviso { color: var(--error); font-size: 13px; margin: 0 0 14px; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 1px 3px rgba(20, 20, 10, .06); }
    th, td { padding: 14px 16px; text-align: left; font-size: 13.5px; border-bottom: 1px solid var(--cream-50); }
    th { font-size: 11.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-muted);
         font-weight: 700; background: var(--cream-50); }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 3px 9px; border-radius: 100px; font-size: 11.5px; font-weight: 700;
             background: var(--cream-50); color: var(--ink-muted); }
    a.aplicar { color: var(--navy-800); font-weight: 700; text-decoration: none; white-space: nowrap; }
    a.aplicar:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="app-card">
    <header>
        <div class="brand">JobSearch<span class="dot">.</span></div>
        <nav>
            <a th:href="@{/perfil/editar}">Editar perfil</a>
            <form class="logout" th:action="@{/logout}" method="post">
                <button type="submit">Sair</button>
            </form>
        </nav>
    </header>

    <section class="hero">
        <h1>Vamos encontrar sua próxima vaga</h1>

        <div class="profile-box">
            <p th:if="${profile != null and !#strings.isEmpty(profile)}" th:text="${profile}"></p>
            <p class="empty" th:unless="${profile != null and !#strings.isEmpty(profile)}">
                Ainda não conhecemos você — conte pra gente que tipo de vaga procura e ativamos a busca automaticamente.
            </p>
            <a th:href="@{/perfil/editar}">Editar perfil →</a>
        </div>

        <div id="radar" class="radar-wrap" th:classappend="${profile != null and !#strings.isEmpty(profile)} ? 'active' : ''">
            <span class="ring ring1"></span>
            <span class="ring ring2"></span>
            <button id="btnBuscar" class="radar-btn"
                    th:disabled="${profile == null or #strings.isEmpty(profile)}">Buscar vagas</button>
        </div>
        <p class="radar-hint" th:if="${profile == null or #strings.isEmpty(profile)}">
            Edite seu perfil para ativar a busca.
        </p>
    </section>

    <section class="results" id="resultsArea"></section>
</div>

<script th:inline="javascript">
    const radar = document.getElementById('radar');
    const btn = document.getElementById('btnBuscar');
    const resultsArea = document.getElementById('resultsArea');
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    let searchedOnce = false;

    btn.addEventListener('click', async () => {
        if (btn.disabled) {
            return;
        }
        radar.classList.add('loading');
        btn.disabled = true;
        btn.textContent = 'Buscando...';
        resultsArea.innerHTML = '';

        try {
            const headers = { [csrfHeader]: csrfToken };
            const response = await fetch('/buscar', { method: 'POST', headers });
            if (!response.ok) {
                throw new Error('status ' + response.status);
            }
            const data = await response.json();
            renderResults(data);
            searchedOnce = true;
        } catch (err) {
            resultsArea.innerHTML = '<p class="aviso">Falha na busca: ' + escapeHtml(err.message) + '</p>';
        } finally {
            radar.classList.remove('loading');
            btn.disabled = false;
            btn.textContent = searchedOnce ? 'Buscar novamente' : 'Buscar vagas';
        }
    });

    function renderResults(data) {
        let html = '';
        if (data.aviso) {
            html += '<p class="aviso">' + escapeHtml(data.aviso) + '</p>';
        }
        html += '<p class="resumo">' + data.results.length + ' vaga(s) encontrada(s)</p>';

        if (data.results.length > 0) {
            html += '<table><thead><tr>'
                + '<th>Vaga</th><th>Empresa</th><th>Local</th><th>Modalidade</th><th>Área</th><th>Senioridade</th><th></th>'
                + '</tr></thead><tbody>';
            for (const r of data.results) {
                html += '<tr>'
                    + '<td>' + escapeHtml(r.job.title) + '</td>'
                    + '<td>' + escapeHtml(r.job.company) + '</td>'
                    + '<td>' + escapeHtml(r.job.city) + '/' + escapeHtml(r.job.state) + '</td>'
                    + '<td>' + escapeHtml(r.job.workMode) + '</td>'
                    + '<td><span class="badge">' + escapeHtml(r.area) + '</span></td>'
                    + '<td><span class="badge">' + escapeHtml(r.seniority) + '</span></td>'
                    + '<td><a class="aplicar" href="' + r.job.link + '" target="_blank">Aplicar →</a></td>'
                    + '</tr>';
            }
            html += '</tbody></table>';
        }
        resultsArea.innerHTML = html;
    }

    function escapeHtml(value) {
        const div = document.createElement('div');
        div.textContent = value == null ? '' : value;
        return div.innerHTML;
    }
</script>
</body>
</html>
