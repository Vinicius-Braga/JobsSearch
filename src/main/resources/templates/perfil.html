<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Editar perfil — JobSearch</title>
<th:block th:replace="~{fragments/styles :: global-styles}"></th:block>
<style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .card { display: flex; width: 100%; max-width: 960px; min-height: 560px; background: white;
            border-radius: 20px; overflow: hidden; box-shadow: var(--card-shadow); }
    .panel-left { flex: 1; background: linear-gradient(var(--navy-800), var(--navy-900)); color: white;
                  padding: 40px; display: flex; flex-direction: column; justify-content: space-between; }
    .brand { font-weight: 800; font-size: 18px; }
    .brand .dot { color: var(--amber-500); }
    .headline { font-size: 26px; font-weight: 800; line-height: 1.25; margin: 0 0 12px; }
    .subtext { font-size: 14px; color: oklch(0.85 0.02 250); line-height: 1.5; max-width: 34ch; }
    .footer-note { font-size: 12px; color: oklch(0.6 0.02 250); }
    .panel-right { flex: 1; padding: 56px 64px; display: flex; flex-direction: column; justify-content: center; }
    h1 { font-size: 26px; font-weight: 800; margin: 0 0 4px; color: var(--ink); }
    .lede { font-size: 14px; color: var(--ink-muted); margin: 0 0 24px; }
    textarea { width: 100%; min-height: 220px; padding: 14px; background: var(--cream-50); border: 1px solid var(--input-border);
               border-radius: 11px; font-family: inherit; font-size: 14px; color: var(--ink); resize: vertical; }
    textarea:focus { outline: none; border-color: var(--navy-800); }
    .actions { display: flex; align-items: center; gap: 18px; margin-top: 20px; }
    button.primary { height: 46px; padding: 0 28px; border: none; border-radius: 11px;
                      background: var(--navy-800); color: white; font-weight: 700; font-size: 15px; cursor: pointer;
                      font-family: inherit; transition: background .2s; }
    button.primary:hover { background: var(--navy-900); }
    .actions a { color: var(--ink-muted); font-size: 13.5px; font-weight: 700; text-decoration: none; }
    .actions a:hover { text-decoration: underline; }
    @media (max-width: 760px) { .card { flex-direction: column; max-width: 420px; } .panel-left { display: none; } }
</style>
</head>
<body>
<div class="card">
    <div class="panel-left">
        <div class="brand">JobSearch<span class="dot">.</span></div>
        <div>
            <p class="headline">Conte com suas palavras.</p>
            <p class="subtext">Quanto mais específico você for — cargo, tecnologias, local, regime — melhor a IA avalia cada vaga pra você.</p>
        </div>
        <p class="footer-note">Você pode editar isso quando quiser.</p>
    </div>
    <div class="panel-right">
        <h1>Editar perfil</h1>
        <p class="lede">Descreva em texto livre o que você procura.</p>
        <form th:action="@{/perfil}" method="post">
            <textarea name="description" rows="7" th:text="${description}"
                      placeholder="Ex: Procuro vagas de RH, junior ou estagio, em Porto Alegre ou remoto. Prefiro empresas de medio porte."></textarea>
            <div class="actions">
                <button class="primary" type="submit">Salvar</button>
                <a th:href="@{/}">Voltar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
