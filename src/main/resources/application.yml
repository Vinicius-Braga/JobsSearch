spring:
  config:
    import: "optional:file:.env[.properties]"
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      # Schema agora é dono do Flyway (db/migration) — Hibernate só confere se bate, não cria/altera mais nada.
      ddl-auto: validate
    open-in-view: false
  flyway:
    # baseline-version: 0 garante que TODAS as migrations (incluindo a V1) rodem mesmo num banco que já
    # tinha as tabelas criadas pelo antigo ddl-auto:update (sem isso, baseline-on-migrate pularia a V1).
    baseline-on-migrate: true
    baseline-version: 0

app:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}
  # Caminho do arquivo de empresas monitoradas (veja README) — trocar via COMPANIES_FILE.
  companies-file: ${COMPANIES_FILE:empresas.txt}
