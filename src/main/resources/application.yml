spring:
  config:
    import: "optional:file:.env[.properties]"
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

app:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}
  # Caminho do arquivo de empresas monitoradas (veja README) — trocar via COMPANIES_FILE.
  companies-file: ${COMPANIES_FILE:empresas.txt}
