spring:
  config:
    import: "optional:file:.env[.properties]"
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

app:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}
  infinitepay:
    handle: ${INFINITEPAY_HANDLE:}
  # URL pública do app, usada pra montar redirect_url/webhook_url do checkout. Prioridade:
  # APP_BASE_URL (se setado manualmente) > RENDER_EXTERNAL_URL (injetado automaticamente pelo
  # Render) > localhost (dev local, onde o webhook da InfinitePay não é alcançável mesmo).
  base-url: ${APP_BASE_URL:${RENDER_EXTERNAL_URL:http://localhost:8080}}
  # Caminho do arquivo de empresas monitoradas (veja README) — trocar via COMPANIES_FILE.
  companies-file: ${COMPANIES_FILE:empresas.txt}
