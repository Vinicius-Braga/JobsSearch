spring:
  config:
    import: "optional:file:.env[.properties]"
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

app:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}
  infinitepay:
    handle: ${INFINITEPAY_HANDLE:}
  # URL pública do app, usada pra montar redirect_url/webhook_url do checkout — trocar via
  # APP_BASE_URL quando hospedado (localhost não é alcançável pelo webhook da InfinitePay).
  base-url: ${APP_BASE_URL:http://localhost:8080}
  # Caminho do arquivo de empresas monitoradas (veja README) — trocar via COMPANIES_FILE.
  companies-file: ${COMPANIES_FILE:empresas.txt}
