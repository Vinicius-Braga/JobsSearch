spring:
  config:
    import: "optional:file:.env[.properties]"
  datasource:
    url: jdbc:h2:file:./data/jobsearch
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

app:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
  security:
    username: ${APP_USER_USERNAME:admin}
    password: ${APP_USER_PASSWORD:changeme}
